<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — FlatSync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      text-align: center;
      max-width: 340px;
    }
    .icon {
      width: 72px; height: 72px;
      background: #eff6ff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    .brand {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #0f172a;
      margin-bottom: 8px;
    }
    .brand span { color: #2563eb; }
    h1 { font-size: 1.1rem; font-weight: 700; color: #1e293b; margin-bottom: 10px; }
    p  { font-size: 0.9rem; color: #64748b; line-height: 1.6; margin-bottom: 28px; }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">📶</div>
    <div class="brand">flat<span>sync</span></div>
    <h1>Sin conexión</h1>
    <p>No se puede conectar a FlatSync. Comprueba tu conexión a internet e inténtalo de nuevo.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
