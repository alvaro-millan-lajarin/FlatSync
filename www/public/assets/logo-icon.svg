<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C6AF7"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="60" height="60" rx="14" fill="url(#grad)"/>
  <!-- Two overlapping squares -->
  <rect x="10" y="10" width="26" height="26" rx="6" fill="rgba(255,255,255,0.25)"/>
  <rect x="24" y="24" width="26" height="26" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Checkmark -->
  <polyline points="16,23 21,28 31,16" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
